<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f6fb" />
  <title>Sudoku — Partie classique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sudoku" />
  <script>if('serviceWorker' in navigator){addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</head>
<body>
  <div class="app">

    <header class="topbar">
      <a class="brand brand-link" href="index.html" aria-label="Accueil">‹ Sudoku</a>
      <button id="new-game" class="btn-new" type="button">Nouvelle partie</button>
    </header>

    <div class="status-bar">
      <div class="stat difficulty" id="difficulty-btn">
        <span class="stat-label">Difficulté</span>
        <span class="stat-value" id="difficulty-value">Facile ▾</span>
        <ul class="difficulty-menu" id="difficulty-menu" hidden>
          <li data-diff="facile">Facile</li>
          <li data-diff="moyen">Moyen</li>
          <li data-diff="difficile">Difficile</li>
          <li data-diff="expert">Expert</li>
        </ul>
      </div>
      <div class="stat">
        <span class="stat-label">Erreurs</span>
        <span class="stat-value" id="errors-value">0/3</span>
      </div>
      <div class="stat time">
        <span class="stat-label">Temps</span>
        <span class="stat-value time-row">
          <span id="time-value">00:00</span>
          <button id="pause-btn" class="pause-btn" type="button" aria-label="Pause">❚❚</button>
        </span>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>

      <div class="overlay" id="overlay" hidden>
        <div class="overlay-card">
          <div class="overlay-title" id="overlay-title">Pause</div>
          <div class="overlay-sub" id="overlay-sub"></div>
          <div class="overlay-actions">
            <button id="overlay-resume" class="btn-primary" type="button">Reprendre</button>
            <button id="overlay-restart" class="btn-ghost" type="button" hidden>Recommencer</button>
            <button id="overlay-new" class="btn-primary" type="button" hidden>Nouvelle partie</button>
          </div>
        </div>
      </div>

      <div class="loading" id="loading" hidden>
        <div class="spinner"></div>
        <span>Génération…</span>
      </div>
    </div>

    <div class="toolbar">
      <button id="tool-undo" class="tool" type="button">
        <span class="tool-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 14 4 9l5-5" /><path d="M4 9h11a5 5 0 0 1 0 10h-4" />
          </svg>
        </span>
        <span class="tool-label">Annuler</span>
      </button>

      <button id="tool-erase" class="tool" type="button">
        <span class="tool-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 14.5 9.5 9 15 14.5 11.5 18H8z" /><path d="m9.5 9 5-5 5 5-5 5" /><path d="M5 20h14" />
          </svg>
        </span>
        <span class="tool-label">Gomme</span>
      </button>

      <button id="tool-pencil" class="tool" type="button">
        <span class="tool-badge" id="pencil-badge">OFF</span>
        <span class="tool-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
          </svg>
        </span>
        <span class="tool-label">Crayon</span>
      </button>

      <button id="tool-autonotes" class="tool" type="button">
        <span class="tool-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
            <text x="3" y="9" font-size="8" font-weight="800" fill="currentColor" stroke="none">A</text>
          </svg>
        </span>
        <span class="tool-label">Auto</span>
      </button>

      <button id="tool-bulb" class="tool" type="button">
        <span class="tool-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18h6" /><path d="M10 21h4" />
            <path d="M12 3a6 6 0 0 0-4 10.5c.8.8 1.3 1.5 1.5 2.5h5c.2-1 .7-1.7 1.5-2.5A6 6 0 0 0 12 3Z" />
          </svg>
        </span>
        <span class="tool-label">Astuce</span>
      </button>
    </div>

    <div class="numpad" id="numpad">
      <button class="num" type="button" data-d="1">1</button>
      <button class="num" type="button" data-d="2">2</button>
      <button class="num" type="button" data-d="3">3</button>
      <button class="num" type="button" data-d="4">4</button>
      <button class="num" type="button" data-d="5">5</button>
      <button class="num" type="button" data-d="6">6</button>
      <button class="num" type="button" data-d="7">7</button>
      <button class="num" type="button" data-d="8">8</button>
      <button class="num" type="button" data-d="9">9</button>
    </div>

    <div class="explain hint-panel" id="hint-panel" hidden>
      <div id="hint-body"></div>
      <div class="hint-actions">
        <button id="hint-more" class="btn-ghost" type="button">Voir la solution</button>
        <button id="hint-place" class="btn-primary" type="button" hidden>Placer</button>
        <button id="hint-close" class="btn-ghost" type="button">Fermer</button>
      </div>
    </div>

    <p class="hint">Astuce : appui <strong>long</strong> sur un chiffre pour le verrouiller, puis tape les cases.</p>

    <div class="modal" id="modal" hidden>
      <div class="modal-card">
        <p id="modal-text">Recommencer la partie ?</p>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn-ghost" type="button">Annuler</button>
          <button id="modal-ok" class="btn-primary" type="button">Confirmer</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/sudoku-engine.js"></script>
  <script src="js/techniques.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
